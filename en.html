<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Menu Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="lang-switch">KO</a>
            <button id="theme-toggle">Theme</button>
        </div>
        <h1>What's for Dinner?</h1>
        <div id="image-container" class="image-container"></div>
        <div class="menu-display">Let me recommend a menu!</div>
        <button id="generate-btn">Get Recommendation</button>

        <div class="contact-section">
            <hr>
            <h3>Affiliate Inquiry</h3>
            <form action="https://formspree.io/f/mgorwbpq" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Please enter your inquiry" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
