<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Dinner Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="lang-switch">KO</a>
            <button id="theme-toggle">Change Theme</button>
        </div>
        <h1>What's for Dinner?</h1>
        <div id="image-container" class="image-container"></div>
        <div class="menu-display">Let me recommend a menu!</div>
        <button id="generate-btn">Get Recommendation</button>

        <div class="contact-section">
            <hr>
            <h3>Affiliate Inquiry</h3>
            <form action="https://formspree.io/f/mgorwbpq" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Please enter your inquiry" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>

        <div id="disqus_section" style="margin-top: 40px;">
            <hr style="opacity: 0.1; margin: 20px 0;">
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;  
                    this.page.identifier = window.location.pathname; 
                };
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-uac2oyeqem.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
