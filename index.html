<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 저녁 메뉴 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="intro-overlay">
        <div class="banana-heart">
            <svg viewBox="0 0 100 100" width="200" height="200">
                <path d="M50 88c-22-12-42-28-42-48 0-17 12-28 27-28 10 0 15 5 15 5s5-5 15-5c15 0 27 11 27 28 0 20-20 36-42 48z" fill="#FFE135">
                    <animate attributeName="transform" type="scale" values="1;1.1;1" dur="1s" repeatCount="indefinite" />
                </path>
                <path d="M50 25c0 0-5-5-10-5M50 25c0 0 5-5 10-5" stroke="#4B3621" stroke-width="2" fill="none" stroke-linecap="round" />
            </svg>
            <p style="color: #FFE135; font-weight: bold; margin-top: 10px;">Nano Banana Heart</p>
        </div>
    </div>
    <div class="container">
        <div class="top-bar">
            <a href="en.html" class="lang-switch">EN</a>
            <button id="theme-toggle">테마 변경</button>
        </div>
        <h1>오늘 뭐 먹지?</h1>
        <div id="image-container" class="image-container"></div>
        <div class="menu-display">메뉴를 추천해드릴게요!</div>
        <button id="generate-btn">메뉴 추천받기</button>

        <div class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/mgorwbpq" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">보내기</button>
            </form>
        </div>

        <div id="disqus_section" style="margin-top: 40px;">
            <hr style="opacity: 0.1; margin: 20px 0;">
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;  
                    this.page.identifier = window.location.pathname; 
                };
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-uac2oyeqem.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
